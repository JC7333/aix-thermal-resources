name: Bilan hebdo email reminder
on:
  schedule:
    - cron: '0 7 * * 1'  # Lundi 7h UTC = 9h Paris
  workflow_dispatch:
jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly reminders via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          set -e

          # 1. Récupérer les contacts de la liste 3 (Bilan Hebdo)
          CONTACTS=$(curl -s -X GET \
            "https://api.brevo.com/v3/contacts/lists/3/contacts?limit=500&offset=0" \
            -H "api-key: ${BREVO_API_KEY}" \
            -H "Content-Type: application/json")

          # 2. Filtrer : uniquement les contacts inscrits depuis moins de 12 semaines
          echo "$CONTACTS" | python3 -c "
          import json, sys
          from datetime import datetime, timedelta, timezone

          data = json.load(sys.stdin)
          contacts = data.get('contacts', [])
          cutoff = datetime.now(timezone.utc) - timedelta(weeks=12)
          valid = []
          for c in contacts:
              email = c.get('email', '')
              attrs = c.get('attributes', {})
              token = attrs.get('TOKEN', '')
              consent = attrs.get('CONSENT_DATE', '')
              if not email or not token:
                  continue
              try:
                  dt = datetime.fromisoformat(consent.replace('Z', '+00:00'))
                  if dt > cutoff:
                      valid.append(f'{email}|{token}')
              except:
                  valid.append(f'{email}|{token}')
          for v in valid:
              print(v)
          " > /tmp/contacts.txt

          COUNT=$(wc -l < /tmp/contacts.txt)
          echo "Contacts to remind: $COUNT (after 12-week filter)"

          if [ "$COUNT" -eq "0" ]; then
            echo "No contacts, exiting"
            exit 0
          fi

          # 3. Envoyer un email neutre à chaque contact
          while IFS='|' read -r EMAIL TOKEN; do
            LINK="https://etuve.fr/bilan-hebdo?token=${TOKEN}"
            UNSUB="https://etuve.fr/bilan-hebdo?token=${TOKEN}&unsub=1"

            curl -s -X POST "https://api.brevo.com/v3/smtp/email" \
              -H "api-key: ${BREVO_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @- <<EMAILJSON
          {
            "sender": {"name": "ÉTUVE", "email": "noreply@etuve.fr"},
            "to": [{"email": "${EMAIL}"}],
            "subject": "Votre bilan de la semaine est prêt",
            "htmlContent": "<html><body style='font-family:Georgia,serif;max-width:480px;margin:0 auto;padding:24px;color:#1a1a1a'><div style='text-align:center;margin-bottom:24px'><span style='font-size:28px;font-weight:bold;color:#1a7a8c'>É</span></div><h2 style='color:#1a7a8c;margin-bottom:16px'>Votre bilan hebdomadaire</h2><p>Bonjour,</p><p>Prenez 2 minutes pour faire le point sur votre semaine.</p><p style='text-align:center;margin:32px 0'><a href='${LINK}' style='background:#1a7a8c;color:white;padding:14px 32px;border-radius:8px;text-decoration:none;font-size:18px;font-weight:600'>Faire mon bilan</a></p><p style='color:#666;font-size:13px;border-top:1px solid #eee;padding-top:16px;margin-top:32px'>Vous recevez cet email car vous avez accepté le suivi hebdomadaire.<br><a href='${UNSUB}' style='color:#888'>Se désinscrire</a></p></body></html>"
          }
          EMAILJSON

            echo "Sent to ${EMAIL}"
            sleep 0.3
          done < /tmp/contacts.txt

          echo "Done: ${COUNT} emails sent"
